  <link rel="stylesheet" href="gallery.css">
  <style>
    :root {
      --navy: #0A2A66;
      --navy-dark: #061a40;
      --teal: #00A8A8;
      --blue: #00AEEF;
      --gold: #D4AF37;
      --gold-light: #e8cc6a;
      --white: #ffffff;
      --bg: #f0f6ff;
      --text: #1a2744;
      --text-muted: #5a6b8a;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --radius: 14px;
      --sidebar-w: 270px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .top-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: 64px;
      background: linear-gradient(90deg, var(--navy-dark) 0%, var(--navy) 60%, #0d3d5c 100%);
      display: flex; align-items: center;
      padding: 0 1.5rem;
      gap: 1rem;
      box-shadow: 0 2px 20px rgba(10,42,102,0.4);
    }
    .top-bar .logo {
      display: flex; align-items: center; gap: 0.6rem;
      color: var(--white);
      font-family: "Montserrat", sans-serif;
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 0.04em;
      text-decoration: none;
      flex-shrink: 0;
    }
    .top-bar .logo strong { color: var(--gold); }
    .top-bar-title {
      font-family: "Montserrat", sans-serif;
      font-weight: 700; font-size: 1.05rem;
      color: var(--gold-light);
      letter-spacing: 0.06em; flex: 1; text-align: center;
    }
    .top-bar-right { display: flex; align-items: center; gap: 0.8rem; flex-shrink: 0; }
    .back-link {
      color: var(--gold-light);
      font-family: "Montserrat", sans-serif;
      font-weight: 600; font-size: 0.8rem;
      text-decoration: none;
      display: flex; align-items: center; gap: 0.3rem;
      transition: color var(--transition);
    }
    .back-link:hover { color: var(--white); }

    .layout { display: flex; min-height: 100vh; padding-top: 64px; }
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: linear-gradient(180deg, var(--navy-dark) 0%, #0c2d5e 50%, #0d3a5c 100%);
      position: fixed; top: 64px; left: 0; bottom: 0;
      overflow-y: auto; overflow-x: hidden; z-index: 100;
      box-shadow: 4px 0 24px rgba(10,42,102,0.3);
    }
    .sidebar-header { padding: 1.2rem 1.2rem 0.8rem; border-bottom: 1px solid rgba(212,175,55,0.2); }
    .sidebar-header h2 {
      font-family: "Montserrat", sans-serif; font-size: 0.75rem; font-weight: 700;
      color: var(--gold); letter-spacing: 0.12em; text-transform: uppercase;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .grade-group { border-bottom: 1px solid rgba(255,255,255,0.06); }
    .grade-toggle {
      width: 100%; background: none; border: none; cursor: pointer;
      padding: 0.75rem 1.2rem; display: flex; align-items: center; gap: 0.7rem;
      color: var(--white); font-family: "Montserrat", sans-serif; font-weight: 700;
      font-size: 0.88rem; letter-spacing: 0.03em; transition: background var(--transition);
      position: relative; text-align: left;
    }
    .grade-toggle:hover { background: rgba(0,174,239,0.12); }
    .grade-toggle.active { background: rgba(0,174,239,0.18); }
    .grade-num {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), #0076b6);
      color: var(--white); font-family: "Montserrat", sans-serif; font-weight: 900;
      font-size: 0.85rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      border: 2px solid rgba(212,175,55,0.5);
    }
    .grade-label { flex: 1; }
    .grade-arrow { font-size: 0.7rem; opacity: 0.6; transition: transform var(--transition); }
    .grade-toggle.active .grade-arrow { transform: rotate(180deg); }
    .grade-submenu { display: none; flex-direction: column; padding: 0.4rem 0 0.6rem 1rem; background: rgba(0,0,0,0.15); }
    .grade-submenu.open { display: flex; }
    .sub-btn {
      background: none; border: none; cursor: pointer; width: 100%; text-align: left;
      padding: 0.52rem 1rem 0.52rem 0.8rem; color: rgba(255,255,255,0.75);
      font-family: "Noto Sans", sans-serif; font-size: 0.82rem; font-weight: 500;
      border-radius: 8px; margin: 0.1rem 0.3rem; transition: all var(--transition);
      display: flex; align-items: center; gap: 0.5rem; position: relative; overflow: hidden; text-decoration: none;
    }
    .sub-btn:hover, .sub-btn.active-sub { color: var(--white); background: rgba(0,174,239,0.15); }
    .sub-btn.active-sub { color: var(--gold-light); font-weight: 700; }
    .sub-icon { font-size: 0.9rem; flex-shrink: 0; }

    .main-content { margin-left: var(--sidebar-w); flex: 1; padding: 2rem 2.5rem; min-height: calc(100vh - 64px); }

    @media (max-width: 900px) {
      .sidebar { transform: translateX(-100%); transition: transform var(--transition); }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left: 0; padding: 1.5rem; }
    }
    @media (max-width: 600px) {
      .main-content { padding: 1rem; }
      .top-bar { padding: 0 1rem; }
      .top-bar-title { display: none; }
    }
  </style>
</head>
